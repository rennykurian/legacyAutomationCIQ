[pytest]
# ✅ Performance Optimizations

# Asyncio mode - required for async tests
asyncio_mode = auto

# Timeout for tests (300 seconds = 5 minutes per test max)
timeout = 300

# Show output during test execution
console_output_style = progress

# Verbose output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    binder: marks tests as binder-related tests
    asyncio: marks tests as async
