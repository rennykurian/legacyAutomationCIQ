name: Run Python script

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Legacy02052026-legacy-regression

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Legacy02052026-legacy-regression/requirements.txt') }}

      - name: Install Playwright system dependencies
        run: python -m playwright install-deps

      - name: Install Playwright browsers
        run: python -m playwright install

      - name: Run tests
        continue-on-error: true
        run: pytest tests/ -v

      - name: Run main script
        run: python test_main.py

      - name: Upload test failure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-report
          path: test_failure_report.xlsx
          if-no-files-found: ignore

      - name: Upload downloads
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/
          if-no-files-found: ignore
