name: Run Python script

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL }}
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: Legacy02052026-legacy-regression/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Legacy02052026-legacy-regression/requirements.txt

      # =========================
      # Playwright setup
      # =========================
      - name: Install Playwright system dependencies
        run: python -m playwright install-deps

      - name: Install Playwright browsers
        run: python -m playwright install

      # =========================
      # Run tests (do not fail pipeline)
      # =========================
      - name: Run tests (single file)
        continue-on-error: true
        run: pytest Legacy02052026-legacy-regression/tests/test_download_from_report_builder.py -v

      # =========================
      # Run main script always
      # =========================
      - name: Run main script
        if: always()
        run: python Legacy02052026-legacy-regression/Login.py

      # =========================
      # Upload downloads
      # =========================
      - name: Upload downloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: Legacy02052026-legacy-regression/downloads/
          if-no-files-found: ignore

      # =========================
      # Upload Excel failure report
      # =========================
      - name: Upload test failure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-report
          path: Legacy02052026-legacy-regression/tests/test_failure_report.xlsx
          if-no-files-found: ignore

      # =========================
      # Upload screenshots (NEW)
      # =========================
      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: Legacy02052026-legacy-regression/screenshots/
          if-no-files-found: ignore
