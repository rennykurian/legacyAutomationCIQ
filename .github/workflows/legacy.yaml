name: Run Python script

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Legacy02052026-legacy-regression

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Legacy02052026-legacy-regression/requirements.txt') }}

      - name: Install Playwright system dependencies
        run: python -m playwright install-deps

      - name: Install Playwright browsers
        run: python -m playwright install

      # ✅ Run all tests but DO NOT stop workflow if they fail
      - name: Run tests
        continue-on-error: true
        run: pytest tests/ -v

      # ✅ Always run main script even if tests fail
      - name: Run main script
        if: always()
        run: python Login.py

      # ✅ Always upload artifacts even if failures happen
      - name: Upload downloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: downloads/
          if-no-files-found: ignore
